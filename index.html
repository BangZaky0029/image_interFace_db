<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Dashboard</title>
  <link rel="stylesheet" href="./style/main.css" />
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="logo">
        <img src="./assets/mnk.jpg" alt="Logo" />
        <h2>Dashboard</h2>
      </div>
      <nav>
        <ul>
          <li><a href="#dashboard">Dashboard</a></li>
          <li><a href="#form">Form Input</a></li>
        </ul>
      </nav>
      <div class="footer-menu">
        <a href="#user">User</a>
        <a href="#logout">Logout</a>
      </div>
    </aside>

    <main class="main-content">
      <section class="form-section" id="form">
        <div class="success-message" id="successMessage"></div>
        <div class="error-message" id="errorMessage"></div>
        
        <div class="form-card">
          <h2>Form Input Order</h2>
          <form id="orderForm">
            <div class="form-row">
              <div class="form-group">
                <label for="id_admin">ID Admin:</label>
                <input type="number" id="id_admin" value="1" required />
              </div>
              <div class="form-group">
                <label for="platform">Platform:</label>
                <input type="text" id="platform" value="TikTok Shop" required />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="nama_customer">Nama Customer:</label>
                <input type="text" id="nama_customer" value="Zaky Aulia Qolbi" required />
              </div>
              <div class="form-group">
                <label for="deadline">Deadline:</label>
                <input type="date" id="deadline" required />
              </div>
            </div>
            <div class="form-group">
              <label for="status_print">Status Print:</label>
              <select id="status_print" required>
                <option value="pending">Pending</option>
                <option value="printed">Printed</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>
            <div class="items-section">
              <div class="items-header">
                <h3>Items</h3>
                <button type="button" class="add-item-btn">+ Add Item</button>
              </div>
              <div id="itemsContainer"></div>
            </div>
            <button type="submit" class="submit-btn">Submit Order</button>
          </form>
        </div>
      </section>
    </main>

  </div>
  <script src="./config/endpoint.js"></script>
  <script type="module" src="./js/POST/main.js"></script>
</body>
</html>
